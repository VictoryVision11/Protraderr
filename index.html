<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Colour Trading Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
height:100vh;
background:#0f2027;
color:white;
overflow:hidden;
}

/* animated background */

.bg{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
z-index:-1;
}

.bg span{
position:absolute;
width:40px;
height:40px;
background:#ff0066;
opacity:0.2;
animation:move 15s linear infinite;
}

@keyframes move{
0%{
transform:translateY(100vh) rotate(0deg);
}
100%{
transform:translateY(-10vh) rotate(360deg);
}
}

/* container */

.container{
text-align:center;
margin-top:120px;
animation:fade 1.5s;
}

.logo{
font-size:45px;
font-weight:700;
background:linear-gradient(45deg,#ffcc00,#ff0066);
-webkit-background-clip:text;
color:transparent;
}

.bonus{
margin-top:10px;
font-size:25px;
color:#00ffae;
animation:pulse 2s infinite;
}

.buttons{
margin-top:30px;
}

.btn{
padding:15px 40px;
margin:10px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
transition:0.4s;
}

.register{
background:#ff0066;
color:white;
box-shadow:0 0 20px #ff0066;
}

.login{
background:#00c3ff;
color:white;
box-shadow:0 0 20px #00c3ff;
}

.telegram{
background:#229ED9;
color:white;
}

.btn:hover{
transform:scale(1.1);
}

/* cards */

.cards{
display:flex;
justify-content:center;
gap:20px;
margin-top:50px;
flex-wrap:wrap;
}

.card{
width:220px;
padding:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border-radius:15px;
transition:0.4s;
}

.card:hover{
transform:translateY(-10px);
}

/* popup */

.popup{
position:fixed;
bottom:20px;
left:20px;
background:#111;
padding:15px 20px;
border-radius:10px;
display:none;
animation:slide 0.5s;
}

@keyframes slide{
from{transform:translateX(-50px);opacity:0}
to{transform:translateX(0);opacity:1}
}

/* animations */

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

.counter{
position:fixed;
top:20px;
right:20px;
background:#111;
padding:10px 15px;
border-radius:10px;
font-size:14px;
}

</style>
</head>

<body>

<div class="bg">

<span style="left:10%;animation-delay:0s"></span>
<span style="left:30%;animation-delay:3s"></span>
<span style="left:60%;animation-delay:6s"></span>
<span style="left:80%;animation-delay:9s"></span>

</div>

<div class="counter">
👥 Online Users: <span id="users">324</span>
</div>

<div class="container">

<div class="logo">
COLOUR TRADING
</div>

<div class="bonus">
🎁 Register Now & Get ₹100 Bonus
</div>

<div class="buttons">

<button class="btn register">Register</button>

<button class="btn login">Login</button>

<a href="https://t.me/yourtelegram">
<button class="btn telegram">Join Telegram</button>
</a>

</div>

<div class="cards">

<div class="card">
<h3>Fast Trading</h3>
<p>Play colour prediction and win money instantly</p>
</div>

<div class="card">
<h3>Instant Withdraw</h3>
<p>UPI withdrawals in minutes</p>
</div>

<div class="card">
<h3>Daily Bonus</h3>
<p>Earn rewards everyday</p>
</div>

</div>

</div>

<div class="popup" id="winPopup">
🎉 Rahul won ₹500
</div>

<script>

/* fake online users */

setInterval(()=>{
let users=document.getElementById("users")
users.innerText=300+Math.floor(Math.random()*200)
},3000)

/* fake win popup */

let names=["Rahul","Aman","Rohit","Vikas","Ajay","Karan"]

setInterval(()=>{

let name=names[Math.floor(Math.random()*names.length)]

let amount=Math.floor(Math.random()*900)+100

let popup=document.getElementById("winPopup")

popup.innerHTML="🎉 "+name+" won ₹"+amount

popup.style.display="block"

setTimeout(()=>{
popup.style.display="none"
},3000)

},5000)

</script>

</body>
  </html>
